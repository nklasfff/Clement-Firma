# ============================================
# Clement Firma — Virksomhedstilpasning
# ============================================
# Denne fil bruges til at tilpasse frameworket
# til den specifikke virksomhed.
# ============================================

virksomhed:
  navn: "Din Virksomhed A/S"
  logo: "assets/images/logo.png"
  branche: "teknologi"  # teknologi | finans | sundhed | produktion | kreativ | offentlig

# Farvetema — tilpasses virksomhedens brandfarver
farver:
  primær: "#2D5A3D"        # Clements grøn (standard)
  sekundær: "#4A7C59"
  accent: "#8FBC8F"
  baggrund: "#F5F5F0"
  tekst: "#2C2C2C"

  # Zone-farver (fra cirkel 1: Tre tilstande)
  grøn_zone: "#4CAF50"
  gul_zone: "#FFC107"
  rød_zone: "#E57373"

# Typografi
typografi:
  overskrift: "Georgia, serif"
  brødtekst: "system-ui, -apple-system, sans-serif"

# Indhold — slå sektioner til/fra
indhold:
  perspektiver:
    medarbejder: true
    leder: true

  temaer:
    generelt: true
    møder: true
    deadlines_og_pres: true
    skærmarbejde: true
    konflikter: true
    work_life_balance: true

  cirkler:
    stressregulering_centrum: true   # Nervesystemregulering → Stressregulering på kontoret
    tre_tilstande: true              # Polyvagal teori → Tre tilstande i din arbejdsdag
    ledelse_og_kultur: true          # Terapeutisk Relation → Ledelse og arbejdskultur
    samarbejdsmønstre: true          # Tilknytningsmønstre → Samarbejdsmønstre
    krop_og_bevægelse: true          # Kropsterapi & Behandling → Krop og bevægelse
    åndedræt_og_pauser: true         # Psykobiologi → Åndedræt og pauser
    mentalt_pres_og_resiliens: true  # Traumer & Dissociation → Mentalt pres og resiliens

# Branchespecifikke eksempler
# Tilpas eksempler og sprog til virksomhedens kontekst
branche_eksempler:
  teknologi:
    deadline_eksempel: "Sprint-afslutning fredag kl. 16"
    møde_eksempel: "Daily stand-up kl. 9:15"
    konflikt_eksempel: "Code review-uenighed"
    skærm_eksempel: "6 timers uafbrudt kodning"

  finans:
    deadline_eksempel: "Kvartalsrapport deadline"
    møde_eksempel: "Kundemøde med investorer"
    konflikt_eksempel: "Uenighed om risikovurdering"
    skærm_eksempel: "Regneark og markedsdata hele dagen"

  sundhed:
    deadline_eksempel: "Vagtskifte og overlevering"
    møde_eksempel: "Tværfaglig konference"
    konflikt_eksempel: "Uenighed om behandlingsplan"
    skærm_eksempel: "Journalskrivning efter patientkontakt"

  produktion:
    deadline_eksempel: "Leveringsfrist til kunde"
    møde_eksempel: "Produktionsmøde mandag morgen"
    konflikt_eksempel: "Kvalitetskontrol-uenighed"
    skærm_eksempel: "Planlægning og logistik ved skærm"

# Hero-billede og cirkelfigur
# Kopiér fra clement-app og placer i assets/images/
assets:
  hero: "assets/images/hero.png"          # IMG_2068.png fra clement-app
  cirkler: "assets/images/cirkler.png"    # IMG_2066.png fra clement-app
